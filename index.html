<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPS PRO | Coach Command Center</title>

  <!-- Pretendard 폰트 로드 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel 컴파일러 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 모듈 Import Map -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react",
        "recharts": "https://esm.sh/recharts@2.10.3?external=react,react-dom"
      }
    }
  </script>

  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .matrix-bg {
      background-image: 
        linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
      background-size: 50% 50%;
    }
  </style>
</head>
<body>
  <div id="root" class="min-h-screen w-full flex flex-col"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Brain, Activity, Bone, AlertCircle, Trophy, Shield, 
      TrendingUp, TrendingDown, LayoutGrid, HeartPulse, 
      Flame, Calendar, BatteryCharging, Zap, Target, ArrowUpDown,
      ArrowLeft, ChevronUp, ChevronDown, CheckCircle2, ShieldAlert, X
    } from 'lucide-react';
    import {
      RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar, Legend, ResponsiveContainer, Tooltip as RechartsTooltip
    } from 'recharts';

    // ==========================================
    // 1. DATA GENERATION & DICTIONARY
    // ==========================================
    const TEAM_NAME = '해온FC';
    const TEST_DATES = ['2026-01-22', '2026-04-22'];
    const POSITIONS = ['FW', 'MF', 'DF', 'GK'];
    const LAST_NAMES = ['김', '이', '박', '최', '정', '강', '조', '윤', '장', '임', '한', '오', '서'];
    const FIRST_NAMES = ['민준', '서준', '도윤', '예준', '시우', '하준', '지호', '주원', '건우', '우진', '선우', '서진'];

    const MENTAL_INFO = {
      tension: { title: '긴장 관리', desc: '떨리는 상황에서도 침착하게 내 플레이를 하는 능력이에요.', context: '중요한 경기나 지고 있을 때 얼마나 당황하지 않는지 보여줘요.' },
      support: { title: '도움 받기', desc: '힘들 때 코치님이나 친구들에게 도움을 잘 청하는 능력이에요.', context: '혼자 끙끙 앓지 않고 팀과 잘 소통하는지 보여줘요.' },
      prep: { title: '경기 준비', desc: '경기 전에 몸과 마음을 완벽하게 세팅하는 능력이에요.', context: '루틴을 잘 지키고 경기에 집중할 준비가 되었는지 알 수 있어요.' },
      recovery: { title: '실수 털어내기', desc: '실수했을 때 빨리 잊고 다시 경기에 집중하는 힘이에요.', context: '패스 미스나 골을 먹힌 직후에 바로 다음 수비로 전환하는 모습에서 나타나요.' },
      focus: { title: '집중력 유지', desc: '짜증 나거나 힘든 상황에서도 포지션과 작전에 집중하는 힘이에요.', context: '화가 나더라도 팀 플레이를 끝까지 책임지는 모습입니다.' },
      matchStab: { title: '경기 기복 덜하기', desc: '언제나 비슷한 실력을 보여주는 안정감이에요.', context: '강팀을 만나거나 압박이 심할 때도 내 페이스를 유지하는지 봅니다.' },
      mentalStab: { title: '마음의 평화', desc: '스트레스를 받아도 마음을 잘 다스리는 능력이에요.', context: '관중 소리나 심판 판정에 쉽게 휩쓸리지 않습니다.' },
      indep: { title: '내 고집 지키기', desc: '남들의 시선보다 나만의 플레이 기준을 믿는 힘이에요.', context: '주변의 칭찬이나 비판에 흔들리지 않고 묵묵히 내 역할을 다합니다.' },
      selfLearn: { title: '스스로 연습하기', desc: '시키지 않아도 스스로 부족한 점을 찾아서 훈련하는 태도예요.', context: '훈련 목표를 정하고, 끝나면 무엇이 좋았는지 스스로 돌아봅니다.' },
      imagery: { title: '머릿속 시뮬레이션', desc: '실제 경기 전에 어떤 플레이를 할지 상상해보는 능력이에요.', context: '슈팅이나 돌파 장면을 미리 머릿속으로 그려보고 들어갑니다.' },
      adapt: { title: '빠른 적응력', desc: '새로운 전술이나 낯선 환경에 빨리 익숙해지는 힘이에요.', context: '갑자기 포지션이 바뀌어도 당황하지 않고 금방 적응합니다.' },
      failRec: { title: '큰 위기 극복', desc: '엄청나게 큰 실수나 패배 위기에서도 무너지지 않는 강인함이에요.', context: '치명적인 실책을 해도 포기하지 않고 끝까지 뛰는 투지를 뜻해요.' },
      attitude: { title: '성실한 훈련 태도', desc: '훈련할 때 꾀부리지 않고 100% 최선을 다하는 자세예요.', context: '체력 훈련이 힘들거나 컨디션이 나빠도 훈련에 집중합니다.' }
    };

    const generateRandomScore = (min, max) => Number((Math.random() * (max - min) + min).toFixed(1));
    const getRiskStatus = (probability) => Math.random() < probability ? '위험' : (Math.random() < probability * 2 ? '주의' : '양호');
    const to100 = (val) => Math.round((val / 6) * 100);

    const calculateCoachMetrics = (physical, mental, growth, baseAvail = null) => {
      let availability = baseAvail !== null ? baseAvail : generateRandomScore(70, 98);
      if (physical.riskLevel.fatigueRisk === '위험') availability -= 15;
      if (physical.riskLevel.phyLoadRisk === '위험') availability -= 15;
      if (physical.riskLevel.redSRisk === '위험') availability -= 10;
      availability = Math.max(0, Math.min(100, availability));

      let coachScore = (mental.mgi * 10) * 0.4 + availability * 0.6; 
      
      let stageText = '키 크기 전';
      let stageScore = 2; 
      if (growth.boneAgeDecimal >= 11.5 && growth.boneAgeDecimal < 13.5) {
        stageText = '폭풍 성장 중';
        stageScore = 5;
      } else if (growth.boneAgeDecimal >= 13.5) {
        stageText = '성장 거의 끝남';
        stageScore = 8;
      }
      stageScore = Math.max(0, Math.min(10, stageScore + generateRandomScore(-1.5, 1.5)));

      return { availability: Math.round(availability), coachScore: Math.round(coachScore), stageText, stageScore: Number(stageScore.toFixed(1)) };
    };

    const generateUniqueNames = (count) => {
      const namesSet = new Set();
      while(namesSet.size < count) {
        const randomName = LAST_NAMES[Math.floor(Math.random() * LAST_NAMES.length)] + FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)];
        namesSet.add(randomName);
      }
      return Array.from(namesSet);
    };

    const generateMockData = () => {
      const data = [];
      const playerCount = 22;
      const uniqueNames = generateUniqueNames(playerCount);

      for (let i = 0; i < playerCount; i++) {
        const playerId = `P${String(i+1).padStart(3, '0')}`;
        const name = uniqueNames[i];
        const position = POSITIONS[i % POSITIONS.length];
        
        let height = generateRandomScore(155, 175);
        let weight = generateRandomScore(45, 65);
        let boneAgeDecimal = generateRandomScore(11.0, 15.0);
        let pah = height + generateRandomScore(3, 22);

        let baseMental = generateRandomScore(3.0, 5.5);
        let baseAvail = generateRandomScore(75, 95);

        TEST_DATES.forEach((date, idx) => {
          if (idx === 1) {
            height += generateRandomScore(0.5, 3.5); 
            weight += generateRandomScore(0.5, 2.0);
            boneAgeDecimal += 0.25;
            baseMental = Math.max(1, Math.min(6, baseMental + generateRandomScore(-0.8, 0.8)));
            baseAvail = Math.max(50, Math.min(100, baseAvail + generateRandomScore(-15, 15)));
          }

          const mental = {
            mgi: Number(baseMental.toFixed(1)),
            major: {
              tension: Number((baseMental + generateRandomScore(-0.6, 0.6)).toFixed(1)),
              support: Number((baseMental + generateRandomScore(-0.6, 0.6)).toFixed(1)),
              prep:    Number((baseMental + generateRandomScore(-0.6, 0.6)).toFixed(1)),
              recovery:Number((baseMental + generateRandomScore(-0.6, 0.6)).toFixed(1)),
              focus:   Number((baseMental + generateRandomScore(-0.6, 0.6)).toFixed(1)),
            },
            detail: {
              matchStab: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              mentalStab: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              indep: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              selfLearn: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              imagery: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              adapt: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              failRec: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              attitude: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
            }
          };

          const physical = {
            riskLevel: {
              phyLoadRisk: getRiskStatus(0.15), fatigueRisk: getRiskStatus(0.2), redSRisk: getRiskStatus(0.05)
            },
            ultrasound: {
              kneeL: getRiskStatus(0.15), kneeR: getRiskStatus(0.15),
              achillesL: getRiskStatus(0.1), achillesR: getRiskStatus(0.1),
              plantarL: getRiskStatus(0.05), plantarR: getRiskStatus(0.05)
            },
            recoveryScore: Math.round(generateRandomScore(60, 95))
          };

          const growth = { boneAgeDecimal: Number(boneAgeDecimal.toFixed(1)), pah: Number(pah.toFixed(1)) };
          const coachMetrics = calculateCoachMetrics(physical, mental, growth, baseAvail);

          data.push({
            id: `${playerId}-${date}`, playerId, name, position, date,
            height: Number(height.toFixed(1)), weight: Number(weight.toFixed(1)),
            mental, physical, growth, coach: coachMetrics, mental100: to100(mental.mgi)
          });
        });
      }
      return data;
    };

    const RAW_DATA = generateMockData();

    // ==========================================
    // 2. DATA PROCESSING HOOK
    // ==========================================
    function useSquadData() {
      return useMemo(() => {
        const currentData = RAW_DATA.filter(d => d.date === TEST_DATES[1]);
        const pastData = RAW_DATA.filter(d => d.date === TEST_DATES[0]);

        const players = currentData.map(curr => {
          const past = pastData.find(p => p.playerId === curr.playerId);
          return {
            ...curr,
            diff: {
              height: past ? Number((curr.height - past.height).toFixed(1)) : 0,
              availability: past ? curr.coach.availability - past.coach.availability : 0,
              mgi100: past ? (curr.mental100 - to100(past.mental.mgi)) : 0,
              coachScore: past ? curr.coach.coachScore - past.coach.coachScore : 0
            },
            past: past || null
          };
        });

        const calcAvg = (arr, keyFn) => Number((arr.reduce((sum, item) => sum + keyFn(item), 0) / arr.length).toFixed(1));
        
        const currentStats = {
          availability: calcAvg(players, p => p.coach.availability),
          mgi100: Math.round(calcAvg(players, p => p.mental100)),
          riskCount: players.filter(p => p.physical.riskLevel.fatigueRisk === '위험' || p.physical.riskLevel.phyLoadRisk === '위험').length,
          growthSpurtCount: players.filter(p => p.coach.stageText === '폭풍 성장 중').length,
          mentalMajor: {
            tension: calcAvg(players, p => p.mental.major.tension),
            support: calcAvg(players, p => p.mental.major.support),
            prep: calcAvg(players, p => p.mental.major.prep),
            recovery: calcAvg(players, p => p.mental.major.recovery),
            focus: calcAvg(players, p => p.mental.major.focus),
          }
        };

        const pastStats = {
          availability: calcAvg(pastData, p => p.coach.availability),
          mgi100: Math.round(calcAvg(pastData, p => to100(p.mental.mgi))),
          riskCount: pastData.filter(p => p.physical.riskLevel.fatigueRisk === '위험' || p.physical.riskLevel.phyLoadRisk === '위험').length,
          growthSpurtCount: pastData.filter(p => p.coach.stageText === '폭풍 성장 중').length,
        };

        const positions = POSITIONS.map(pos => {
          const posPlayers = players.filter(p => p.position === pos);
          if(posPlayers.length === 0) return null;
          return {
            position: pos,
            loadAvg: posPlayers.filter(p => p.physical.riskLevel.phyLoadRisk === '위험').length,
            mgi100Avg: Math.round(calcAvg(posPlayers, p => p.mental100)),
            availAvg: calcAvg(posPlayers, p => p.coach.availability),
            major: {
              tension: calcAvg(posPlayers, p => p.mental.major.tension),
              support: calcAvg(posPlayers, p => p.mental.major.support),
              prep: calcAvg(posPlayers, p => p.mental.major.prep),
              recovery: calcAvg(posPlayers, p => p.mental.major.recovery),
              focus: calcAvg(posPlayers, p => p.mental.major.focus),
            }
          };
        }).filter(Boolean);

        return { 
          players, 
          stats: { 
            current: currentStats, 
            diff: { 
              availability: Number((currentStats.availability - pastStats.availability).toFixed(1)), 
              mgi100: currentStats.mgi100 - pastStats.mgi100, 
              riskCount: currentStats.riskCount - pastStats.riskCount, 
              growthSpurtCount: currentStats.growthSpurtCount - pastStats.growthSpurtCount 
            } 
          }, 
          positions 
        };
      }, []);
    }

    // ==========================================
    // 3. UI COMPONENTS & UTILS
    // ==========================================
    
    const DisclaimerFooter = () => (
      <div className="mt-12 pt-6 pb-8 border-t border-slate-300/50 w-full shrink-0">
        <div className="max-w-6xl mx-auto px-4 text-[9px] text-slate-400 leading-relaxed text-left space-y-1 opacity-80">
          <p>1. (주)주니어골든에이지는 IT 플랫폼 제공사이며, 의료기관, 스포츠평가기관이 아닙니다.</p>
          <p>2. 플랫폼 내 리포트는 제휴 의료기관에서 측정된 데이터를 기반으로 스포츠관점에서 시각화된 정보이며, 절대적인 의학적 진단이나 치료를 대신하지 않습니다.</p>
          <p>3. 실제 의료 검진(초음파 판독 등) 및 그에 따른 의학적 책임은 해당 행위를 직접 수행한 독립된 제휴 의료기관 소속 의료진에게 있습니다.</p>
          <p>4. 본 플랫폼에 있는 스포츠 정보는 플랫폼 사용자의 이해를 돕기위한 참고정보로만 활용하도록 구성되어있습니다. (이해를 돕기 위해 변형된 부분도 있습니다)</p>
        </div>
      </div>
    );

    const getMentalRiskStatus = (score) => {
      if (score >= 4.5) return { label: '안정', color: 'text-[#10b981]', bg: 'bg-[#10b981]/10', border: 'border-[#10b981]/30' };
      if (score >= 3.0) return { label: '주의', color: 'text-[#fbbc04]', bg: 'bg-[#fbbc04]/10', border: 'border-[#fbbc04]/30' };
      return { label: '위험', color: 'text-[#e30613]', bg: 'bg-[#e30613]/10', border: 'border-[#e30613]/30' };
    };

    const getSignalLight = (status) => {
      if (status === '위험') return 'bg-[#e30613] shadow-[0_0_5px_#e30613]';
      if (status === '주의') return 'bg-[#fbbc04] shadow-[0_0_5px_#fbbc04]';
      return 'bg-[#10b981] shadow-[0_0_5px_#10b981]';
    }

    const ScoreBar100 = ({ label, score, colorClass, showLabel = true }) => (
      <div className="flex items-center gap-2">
        {showLabel && <div className="w-14 text-right text-[11px] font-bold text-slate-500 truncate">{label}</div>}
        <div className="flex-1 h-2.5 bg-slate-200 rounded-full overflow-hidden">
          <div className={`h-full ${colorClass} transition-all duration-700 ease-out`} style={{ width: `${score}%` }}></div>
        </div>
        <div className="w-8 text-right text-[11px] font-black text-[#0b1c2d]">{score}점</div>
      </div>
    );

    const TrendIndicator = ({ value, unit = '', reverseColors = false }) => {
      const isPositive = value > 0;
      const isNeutral = value === 0;
      const displayValue = Math.abs(value);
      
      let colorClass = "text-slate-400";
      if (!isNeutral) {
        colorClass = reverseColors 
          ? (isPositive ? "text-[#e30613]" : "text-[#10b981]") 
          : (isPositive ? "text-[#10b981]" : "text-[#e30613]");
      }

      return (
        <span className={`inline-flex items-center text-[10px] font-bold px-1.5 py-0.5 rounded bg-slate-100 ${colorClass}`}>
          {isPositive ? <TrendingUp className="w-2.5 h-2.5 mr-0.5" /> : (!isNeutral && <TrendingDown className="w-2.5 h-2.5 mr-0.5" />)}
          {isNeutral ? '-' : `${displayValue}${unit}`}
        </span>
      );
    };

    const KpiCard = ({ title, value, unit, diff, desc, icon: Icon, color, reverseColors=false, onClick }) => {
      const colorMap = { blue: "text-blue-600 bg-blue-50", red: "text-[#e30613] bg-[#e30613]/10", indigo: "text-indigo-600 bg-indigo-50", amber: "text-[#d97706] bg-[#fbbc04]/10" };
      return (
        <div onClick={onClick} className={`bg-white rounded-xl p-4 border border-slate-200 shadow-sm flex flex-col justify-between h-full ${onClick ? 'cursor-pointer hover:border-blue-400 hover:shadow-md transition-all' : ''}`}>
          <div className="flex justify-between items-start mb-2">
            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-tight">{title}</h3>
            <div className={`p-1.5 rounded-md ${colorMap[color]}`}><Icon className="w-4 h-4" /></div>
          </div>
          <div className="flex items-end gap-2 mb-1">
            <div className="text-2xl font-black text-[#0b1c2d] leading-none">{value}<span className="text-xs text-slate-400 font-bold ml-1">{unit}</span></div>
            <TrendIndicator value={diff} reverseColors={reverseColors} />
          </div>
          <p className="text-[10px] font-bold text-slate-400 truncate mt-1">{desc}</p>
        </div>
      );
    };

    const ActionListCard = ({ title, players, valueKey, unit, isWarning=false, isPlus=false, onPlayerClick }) => {
      const getValue = (obj, path) => path.split('.').reduce((o, i) => o[i], obj);
      return (
        <div className="bg-slate-50 rounded-xl p-3 border border-slate-200 flex flex-col h-full shadow-sm">
          <h4 className={`font-black text-sm mb-3 flex items-center gap-1.5 ${isWarning ? 'text-[#e30613]' : 'text-[#0b1c2d]'}`}>
             {isWarning ? <Flame className="w-4 h-4"/> : <Target className="w-4 h-4 text-blue-600"/>} {title}
          </h4>
          <ul className="space-y-2 flex-1 flex flex-col justify-center">
            {players.map((p, idx) => {
              const val = getValue(p, valueKey);
              return (
                <li key={p.playerId} onClick={() => onPlayerClick(p.playerId)} className="flex justify-between items-center bg-white px-3 py-2 rounded-lg shadow-sm text-sm cursor-pointer hover:border-blue-400 hover:shadow-md border border-transparent transition-all">
                  <div className="flex items-center gap-2">
                    <span className="font-bold text-blue-600 hover:underline">{p.name}</span>
                    <span className="text-[10px] text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">{p.position}</span>
                  </div>
                  <span className={`font-black text-sm ${isWarning ? 'text-[#e30613]' : (isPlus ? 'text-[#10b981]' : 'text-blue-600')}`}>
                    {isPlus ? '+' : ''}{typeof val === 'number' && !isPlus ? val.toFixed(1) : val}{unit}
                  </span>
                </li>
              )
            })}
          </ul>
        </div>
      );
    }


    // ==========================================

          <div className="p-4 border-b border-slate-100">
            <h3 className="text-base font-black text-[#0b1c2d] flex items-center gap-2">
              <BatteryCharging className="w-5 h-5 text-[#10b981]" />
              오늘 뛸 수 있나? (출전 가능 점수)
            </h3>
            <p className="text-xs text-slate-500 font-bold mt-1">몸 상태, 피로도, 초음파 결과를 100점 만점으로 합친 점수예요. 점수가 낮으면 쉬게 해주세요.</p>
          </div>
          <div className="p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {[...players].sort((a, b) => a.coach.availability - b.coach.availability).map(player => {
              let barColor = "bg-[#10b981]";
              if (player.coach.availability < 60) barColor = "bg-[#e30613]";
              else if (player.coach.availability < 80) barColor = "bg-[#fbbc04]";

              return (
                <div key={player.playerId} className="bg-slate-50 rounded-xl p-4 border border-slate-100 flex flex-col justify-center shadow-sm">
                  <div className="flex justify-between items-center mb-2">
                    <div className="flex items-center gap-2 cursor-pointer group" onClick={() => setSelectedPlayerId(player.playerId)}>
                      <span className="font-black text-sm text-blue-600 group-hover:underline">{player.name}</span>
                      <span className="text-[10px] text-slate-400 bg-white border border-slate-200 px-1.5 py-0.5 rounded">{player.position}</span>
                    </div>
                    <TrendIndicator value={player.diff.availability} />
                  </div>
                  <ScoreBar100 label="뛸 수 있는 상태" score={player.coach.availability} colorClass={barColor} showLabel={false} />
                  <div className="flex gap-2 mt-3 pt-3 border-t border-slate-200">
                    {player.physical.riskLevel.phyLoadRisk === '위험' && <span className="text-[10px] bg-[#e30613]/10 text-[#e30613] font-bold px-2 py-1 rounded">무리함</span>}
                    {player.physical.riskLevel.fatigueRisk === '위험' && <span className="text-[10px] bg-[#fbbc04]/20 text-[#d97706] font-bold px-2 py-1 rounded">피로 쌓임</span>}
                    {player.physical.riskLevel.redSRisk === '위험' && <span className="text-[10px] bg-purple-100 text-purple-700 font-bold px-2 py-1 rounded">에너지 부족</span>}
                    {(player.physical.riskLevel.phyLoadRisk !== '위험' && player.physical.riskLevel.fatigueRisk !== '위험' && player.physical.riskLevel.redSRisk !== '위험') && <span className="text-[10px] text-slate-400 font-bold">건강함</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );

      const renderGrowthTab = () => {
        const sortedGrowth = [...players].sort((a, b) => {
          let valA, valB;
          if (bioSort.key === 'name') { valA = a.name; valB = b.name; }
          else if (bioSort.key === 'boneAge') { valA = a.growth.boneAgeDecimal; valB = b.growth.boneAgeDecimal; }
          else if (bioSort.key === 'remain') { valA = a.growth.pah - a.height; valB = b.growth.pah - b.height; }

          if (valA < valB) return bioSort.dir === 'asc' ? -1 : 1;
          if (valA > valB) return bioSort.dir === 'asc' ? 1 : -1;
          return 0;
        });

        return (
          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col animate-in fade-in duration-300 mb-8">
             <div className="p-4 border-b border-slate-100 flex flex-col md:flex-row md:justify-between md:items-center gap-3">
              <div>
                <h3 className="text-base font-black text-[#0b1c2d] flex items-center gap-2">
                  <TrendingUp className="w-5 h-5 text-[#fbbc04]" />
                  성장 단계 (얼마나 더 클까?)
                </h3>
                <p className="text-xs text-slate-500 font-bold mt-1">뼈나이와 예상 최종키를 보면, 이 선수가 앞으로 얼마나 더 클지 알 수 있어요.</p>
              </div>
              <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200 gap-1 shrink-0">
                <button onClick={() => handleBioSort('name')} className={`px-3 py-1.5 text-xs font-bold rounded-lg flex items-center transition-colors ${bioSort.key === 'name' ? 'bg-white text-[#0b1c2d] shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                  이름순 {getSortIcon('name')}
                </button>
                <button onClick={() => handleBioSort('boneAge')} className={`px-3 py-1.5 text-xs font-bold rounded-lg flex items-center transition-colors ${bioSort.key === 'boneAge' ? 'bg-white text-[#0b1c2d] shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                  뼈나이순 {getSortIcon('boneAge')}
                </button>
                <button onClick={() => handleBioSort('remain')} className={`px-3 py-1.5 text-xs font-bold rounded-lg flex items-center transition-colors ${bioSort.key === 'remain' ? 'bg-white text-[#0b1c2d] shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                  더 많이 클 순서 {getSortIcon('remain')}
                </button>
              </div>
            </div>
            <div className="p-5">
              <div className="space-y-4 max-w-5xl mx-auto">
                {sortedGrowth.map((player, idx) => {
                  const remain = player.growth.pah - player.height;
                  const currentRatio = (player.height / 195) * 100;
                  const remainRatio = (remain / 195) * 100;
                  const baYear = Math.floor(player.growth.boneAgeDecimal);
                  const baMonth = Math.round((player.growth.boneAgeDecimal % 1) * 12);

                  return (
                    <div key={player.playerId} className="flex items-center gap-4 bg-slate-50 hover:bg-slate-100 p-4 rounded-xl transition-colors border border-slate-100 shadow-sm">
                      <div className="w-6 text-center text-xs font-black text-slate-300">{idx + 1}</div>
                      <div className="w-24 cursor-pointer group" onClick={() => setSelectedPlayerId(player.playerId)}>
                        <div className="font-black text-sm text-blue-600 group-hover:underline">{player.name}</div>
                        <div className="text-[10px] text-[#d97706] font-bold bg-[#fbbc04]/10 px-1.5 py-0.5 rounded inline-block mt-1">{player.coach.stageText}</div>
                      </div>
                      
                      <div className="w-24 text-center border-r border-slate-200 pr-4">
                        <div className="text-[10px] text-slate-400 mb-1 font-bold">뼈나이</div>
                        <div className="text-sm font-black text-slate-700">{baYear}년 {baMonth}월</div>
                      </div>

                      <div className="flex-1 relative pl-5">
                        <div className="flex justify-between text-xs font-bold text-slate-500 mb-1.5">
                          <span>현재 {player.height.toFixed(1)}cm</span>
                          <span className="text-[#d97706]">아직 <span className="font-black text-base">{remain.toFixed(1)}</span>cm 더 큼 (예상 {player.growth.pah}cm)</span>
                        </div>
                        <div className="h-4 bg-white border border-slate-200 rounded-full flex overflow-hidden w-full shadow-inner">
                          <div className="h-full bg-slate-800 rounded-l-full relative" style={{ width: `${currentRatio}%` }}></div>
                          <div className="h-full bg-[#fbbc04]" style={{ width: `${remainRatio}%` }}></div>
                        </div>
                      </div>

                      <div className="w-24 text-right pl-4 border-l border-slate-200">
                        <div className="text-[10px] text-slate-400 mb-1 font-bold">최근 3개월</div>
                        <div className="text-xs font-black text-[#e30613] bg-[#e30613]/10 px-2 py-1 rounded inline-block">+{player.diff.height}cm</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      const renderMentalTab = () => {
        const radarData = [
          { subject: '긴장관리', team: to100(stats.current.mentalMajor.tension), national: 71, fullMark: 100 },
          { subject: '도움받기', team: to100(stats.current.mentalMajor.support), national: 74, fullMark: 100 },
          { subject: '경기준비', team: to100(stats.current.mentalMajor.prep), national: 73, fullMark: 100 },
          { subject: '실수털기', team: to100(stats.current.mentalMajor.recovery), national: 68, fullMark: 100 },
          { subject: '집중유지', team: to100(stats.current.mentalMajor.focus), national: 72, fullMark: 100 },
        ];

        return (
          <div className="grid grid-cols-1 md:grid-cols-3 gap-5 animate-in fade-in duration-300 mb-8">
            <div className="bg-[#0b1c2d] rounded-2xl shadow-sm border border-slate-700 p-5 text-white flex flex-col md:col-span-1 min-h-[400px]">
              <h3 className="text-base font-black flex items-center gap-2 mb-3 text-slate-100 shrink-0">
                <Brain className="w-5 h-5 text-indigo-400" />
                우리 팀 5가지 마음의 힘
              </h3>
              <div className="flex-1 w-full relative bg-slate-900/50 rounded-xl mt-2 p-3">
                <ResponsiveContainer width="100%" height="100%">
                  <RadarChart cx="50%" cy="50%" outerRadius="65%" data={radarData}>
                    <PolarGrid stroke="#334155" />
                    <PolarAngleAxis dataKey="subject" tick={{ fill: '#94a3b8', fontSize: 11, fontWeight: 'bold' }} />
                    <PolarRadiusAxis angle={30} domain={[0, 100]} tick={{ fill: '#475569', fontSize: 9 }} />
                    <Radar name="우리 팀" dataKey="team" stroke="#818cf8" fill="#818cf8" fillOpacity={0.5} strokeWidth={2} />
                    <Radar name="전국 다른 팀" dataKey="national" stroke="#94a3b8" fill="#94a3b8" fillOpacity={0.2} strokeDasharray="3 3" />
                    <Legend wrapperStyle={{ fontSize: '11px', marginTop: '10px' }} />
                    <RechartsTooltip contentStyle={{backgroundColor: '#1e293b', border: 'none', borderRadius: '8px', color: '#fff', fontSize: '12px'}} itemStyle={{color: '#fff', fontWeight: 'bold'}}/>
                  </RadarChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col md:col-span-2">
              <div className="p-5 border-b border-slate-100 shrink-0">
                <h3 className="text-base font-black text-[#0b1c2d] flex items-center gap-2">
                  <Shield className="w-5 h-5 text-slate-600" />
                  포지션별 멘탈 점수 (100점 만점)
                </h3>
                <p className="text-xs text-slate-500 font-bold mt-1">공격수, 미드필더 등 포지션별로 마음이 얼마나 단단한지 보여줘요.</p>
              </div>
              <div className="flex-1 overflow-x-auto p-5 custom-scrollbar">
                <table className="w-full text-left whitespace-nowrap min-w-max">
                  <thead className="text-xs text-slate-500 font-black bg-slate-50">
                    <tr>
                      <th className="px-4 py-3 rounded-l-lg border-b border-slate-200">포지션</th>
                      <th className="px-4 py-3 text-center border-b border-slate-200 text-indigo-600">멘탈 총점</th>
                      <th className="px-4 py-3 border-b border-slate-200">긴장 관리</th>
                      <th className="px-4 py-3 border-b border-slate-200">도움 받기</th>
                      <th className="px-4 py-3 border-b border-slate-200">경기 준비</th>
                      <th className="px-4 py-3 border-b border-slate-200">실수 털기</th>
                      <th className="px-4 py-3 rounded-r-lg border-b border-slate-200">집중 유지</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-sm">
                    {positions.map(pos => {
                      return (
                        <tr key={pos.position} className="hover:bg-slate-50 transition-colors">
                          <td className="px-4 py-4 font-black text-[#0b1c2d]">{pos.position}</td>
                          <td className="px-4 py-4 text-center">
                            <span className="font-black text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg">{pos.mgi100Avg}점</span>
                          </td>
                          <td className="px-4 py-4 w-36"><ScoreBar100 score={to100(pos.major.tension)} colorClass="bg-blue-400" showLabel={false} /></td>
                          <td className="px-4 py-4 w-36"><ScoreBar100 score={to100(pos.major.support)} colorClass="bg-emerald-400" showLabel={false} /></td>
                          <td className="px-4 py-4 w-36"><ScoreBar100 score={to100(pos.major.prep)} colorClass="bg-amber-400" showLabel={false} /></td>
                          <td className="px-4 py-4 w-36"><ScoreBar100 score={to100(pos.major.recovery)} colorClass="bg-rose-400" showLabel={false} /></td>
                          <td className="px-4 py-4 w-36"><ScoreBar100 score={to100(pos.major.focus)} colorClass="bg-purple-400" showLabel={false} /></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen w-full flex flex-col bg-[#f1f5f9] relative">
          
          <header className="bg-[#0b1c2d] text-white h-16 flex items-center justify-between px-6 shrink-0 shadow-lg z-40 sticky top-0">
            <div className="flex items-center gap-4">
              <div className="w-10 h-10 bg-gradient-to-br from-[#e30613] to-[#8a040b] rounded-xl flex items-center justify-center shadow-inner border border-white/10">
                <Trophy className="w-5 h-5 text-white" />
              </div>
              <div className="flex items-baseline gap-3">
                <h1 className="text-xl font-black tracking-wider">MPS <span className="text-[#e30613]">PRO</span></h1>
                <span className="text-slate-600 font-bold text-base">|</span>
                <span className="font-black text-[#fbbc04] text-base">{TEAM_NAME}</span>
              </div>
            </div>
            <div className="flex items-center text-xs text-slate-300 font-bold bg-white/10 px-4 py-2 rounded-full border border-white/10">
              <Calendar className="w-4 h-4 mr-2" />
              최근 검사: {TEST_DATES[1]} <span className="mx-3 opacity-30">|</span> 이전 검사: {TEST_DATES[0]}
            </div>
          </header>

          <main className="flex-1 flex flex-col p-4 md:p-6 max-w-[1600px] mx-auto w-full relative z-0">
            
            <div className="flex flex-col lg:flex-row gap-4 mb-6">
              <div className="lg:w-1/4 bg-white rounded-2xl p-5 shadow-sm border-l-4 border-[#e30613] flex flex-col justify-center">
                <div className="flex items-center gap-2 mb-3 text-[#e30613]">
                  <Zap className="w-5 h-5" />
                  <h2 className="font-black text-xs uppercase tracking-wider">AI 코치 한눈에 보기</h2>
                </div>
                <p className="text-sm font-bold text-[#0b1c2d] leading-relaxed break-keep">{generateSummary()}</p>
              </div>
              <div className="lg:w-3/4 grid grid-cols-2 md:grid-cols-4 gap-4">
                <KpiCard title="출전 가능 점수" value={stats.current.availability} unit="점" diff={stats.diff.availability} icon={Activity} color="blue" />
                <KpiCard title="위험 / 휴식 필요" value={stats.current.riskCount} unit="명" diff={stats.diff.riskCount} reverseColors={true} icon={Flame} color="red" onClick={() => setActiveModal('risk')} />
                <KpiCard title="팀 멘탈 점수" value={stats.current.mgi100} unit="점" diff={stats.diff.mgi100} icon={Brain} color="indigo" />
                <KpiCard title="폭풍 성장 중" value={stats.current.growthSpurtCount} unit="명" diff={stats.diff.growthSpurtCount} icon={TrendingUp} color="amber" onClick={() => setActiveModal('growth')} />
              </div>
            </div>

            <div className="flex flex-wrap gap-2.5 mb-6 shrink-0">
              {tabs.map(tab => {
                const Icon = tab.icon;
                const isActive = activeTab === tab.id;
                return (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex items-center px-5 py-2.5 rounded-xl text-sm font-black transition-all shadow-sm ${
                      isActive 
                        ? 'bg-[#0b1c2d] text-white' 
                        : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 hover:text-[#0b1c2d]'
                    }`}
                  >
                    <Icon className={`w-4 h-4 mr-2 ${isActive ? 'text-[#fbbc04]' : 'text-slate-400'}`} />
                    {tab.title}
                  </button>
                )
              })}
            </div>

            <div className="w-full">
              {activeTab === 'matrix' && renderMatrixTab()}
              {activeTab === 'availability' && renderAvailabilityTab()}
              {activeTab === 'growth' && renderGrowthTab()}
              {activeTab === 'mental' && renderMentalTab()}
            </div>

            <DisclaimerFooter />

            {/* --- 명단 모달 팝업 --- */}
            {activeModal && (
              <div className="fixed inset-0 bg-[#0b1c2d]/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200">
                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md flex flex-col max-h-[80vh]">
                  <div className="p-5 border-b border-slate-100 flex justify-between items-center shrink-0">
                    <h2 className="text-xl font-black text-[#0b1c2d] flex items-center gap-2.5">
                      {activeModal === 'risk' ? <Flame className="text-[#e30613] w-6 h-6"/> : <TrendingUp className="text-[#fbbc04] w-6 h-6"/>}
                      {activeModal === 'risk' ? '위험해서 쉬어야 할 선수' : '지금 막 크고 있는 선수'}
                    </h2>
                    <button onClick={() => setActiveModal(null)} className="p-1.5 text-slate-400 hover:bg-slate-100 hover:text-[#0b1c2d] rounded-lg transition-colors"><X className="w-6 h-6"/></button>
                  </div>
                  <div className="p-3 overflow-y-auto custom-scrollbar flex-1">
                    {(activeModal === 'risk' ? riskPlayersList : growthPlayersList).length === 0 ? (
                      <div className="p-8 text-center text-slate-400 font-bold text-base">해당하는 선수가 없습니다.</div>
                    ) : (
                      <div className="space-y-2">
                        {(activeModal === 'risk' ? riskPlayersList : growthPlayersList).map(p => (
                          <div key={p.playerId} onClick={() => { setActiveModal(null); setSelectedPlayerId(p.playerId); }} className="flex justify-between items-center p-4 hover:bg-slate-50 cursor-pointer border border-transparent hover:border-blue-200 rounded-xl transition-colors shadow-sm">
                            <div className="flex items-center gap-3">
                              <span className="font-black text-blue-600 text-base hover:underline">{p.name}</span>
                              <span className="text-xs text-slate-500 font-bold bg-white border border-slate-200 px-2 py-1 rounded">{p.position}</span>
                            </div>
                            {activeModal === 'risk' ? (
                               <div className="flex gap-2">
                                 {p.physical.riskLevel.phyLoadRisk === '위험' && <span className="text-xs bg-[#e30613]/10 text-[#e30613] font-bold px-2.5 py-1.5 rounded">몸이 무리함</span>}
                                 {p.physical.riskLevel.fatigueRisk === '위험' && <span className="text-xs bg-[#fbbc04]/20 text-[#d97706] font-bold px-2.5 py-1.5 rounded">피로가 쌓임</span>}
                               </div>
                            ) : (
                               <span className="text-xs text-[#d97706] font-black bg-[#fbbc04]/10 px-3 py-1.5 rounded">
                                  뼈나이 {Math.floor(p.growth.boneAgeDecimal)}년 {Math.round((p.growth.boneAgeDecimal%1)*12)}월
                               </span>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* --- 선수 상세 전체 화면 모달 --- */}
          {selectedPlayerId && (() => {
            const player = players.find(p => p.playerId === selectedPlayerId);
            return player ? <PlayerDetail player={player} onBack={() => setSelectedPlayerId(null)} /> : null;
          })()}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
