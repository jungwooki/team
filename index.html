<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPS PRO | Team Dashboard</title>

  <!-- 1. Pretendard 폰트 로드 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <!-- 2. Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 3. Babel 컴파일러 (브라우저에서 JSX 실행용) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 4. 모듈 Import Map (React, Recharts, Lucide Icons) -->
  <!-- 에러 수정: "react-dom" 기본 경로 추가 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react",
        "recharts": "https://esm.sh/recharts@2.10.3?external=react,react-dom"
      }
    }
  </script>

  <!-- 커스텀 스크롤바 스타일 -->
  <style>
    body { font-family: 'Pretendard', sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <!-- React 앱이 렌더링될 루트 요소 -->
  <div id="root"></div>

  <!-- React 앱 코드 (ES Module + Babel) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Users, Search, Brain, Activity, Bone, AlertCircle, ChevronDown, ChevronUp, ChevronRight,
      Download, Settings, Maximize2, Lock, Shield, Trophy, Info, X, Zap, HeartPulse, Flame, Calendar,
      ArrowRight, FileText, LayoutGrid, ArrowLeft, TrendingUp, LineChart as LineChartIcon
    } from 'lucide-react';
    import {
      Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, Legend, ResponsiveContainer,
      ScatterChart, Scatter, ZAxis, LineChart, Line, ComposedChart
    } from 'recharts';

    // --- Data Generator ---
    const TEAMS = ['서울대동초', '서울솔트FC', '양강초', '영등포스포츠클럽', '서울세일중학교', '화성FC'];
    const LAST_NAMES = ['김', '이', '박', '최', '정', '강', '조', '윤', '장', '임', '한', '오', '서', '신', '권', '황', '안', '송', '전', '홍'];
    const FIRST_NAMES = ['민준', '서준', '도윤', '예준', '시우', '하준', '지호', '주원', '건우', '우진', '선우', '서진', '연우', '은우', '윤우', '승우', '지훈', '도현', '동현', '준서'];

    const generateRandomScore = (min, max) => Number((Math.random() * (max - min) + min).toFixed(1));
    const getRandomStatus = () => {
      const rand = Math.random();
      if (rand > 0.85) return '위험';
      if (rand > 0.6) return '주의';
      return '양호';
    };

    // 선수별 1, 2회차 누적 데이터 생성
    const generateMockData = () => {
      const data = [];
      let idCounter = 1;

      TEAMS.forEach(team => {
        const playerCount = Math.floor(Math.random() * 6) + 15; 
        
        for (let i = 0; i < playerCount; i++) {
          const playerId = `P${String(idCounter++).padStart(4, '0')}`;
          const name = LAST_NAMES[Math.floor(Math.random() * LAST_NAMES.length)] + FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)];
          
          const isGrade6 = i % 2 === 0;
          const birthYear = isGrade6 ? '2014' : '2015';
          const birthMonth = String(Math.floor(Math.random() * 12) + 1).padStart(2, '0');
          const birthDay = String(Math.floor(Math.random() * 28) + 1).padStart(2, '0');
          
          let height = generateRandomScore(140, 160);
          let weight = generateRandomScore(35, 50);
          let boneAgeYear = isGrade6 ? Math.floor(Math.random() * 3) + 11 : Math.floor(Math.random() * 3) + 10;
          let boneAgeMonth = Math.floor(Math.random() * 12);
          
          ['2026-03', '2026-06'].forEach((dateCode, idx) => {
            if (idx === 1) {
              height += generateRandomScore(0.5, 2.5);
              weight += generateRandomScore(0.2, 1.5);
              boneAgeMonth += 3;
              if (boneAgeMonth >= 12) {
                boneAgeYear += 1;
                boneAgeMonth -= 12;
              }
            }

            const tension = generateRandomScore(2.0, 6.0);
            const support = generateRandomScore(2.0, 6.0);
            const prep = generateRandomScore(2.0, 6.0);
            const recovery = generateRandomScore(2.0, 6.0);
            const focus = generateRandomScore(2.0, 6.0);
            const stability = generateRandomScore(2.0, 6.0);
            const mgi = Number(((tension + support + prep + recovery + focus + stability) / 6).toFixed(1));

            const boneAgeDecimal = boneAgeYear + (boneAgeMonth / 12);

            data.push({
              recordId: `${playerId}-${dateCode}`,
              playerId,
              name,
              gender: '남',
              birth: `${birthYear}-${birthMonth}-${birthDay}`,
              team,
              grade: isGrade6 ? 6 : 5,
              testDateCode: dateCode,
              centerName: idx === 0 ? '서울신도림센터' : '동탄센터',
              height: Number(height.toFixed(1)),
              weight: Number(weight.toFixed(1)),
              mental: { 
                tension, support, prep, recovery, focus, stability, mgi, 
                wmi: generateRandomScore(2.5, 5.5),
                detail: { attitude: generateRandomScore(3.0, 6.0) }
              },
              physical: { 
                fat: generateRandomScore(10, 22), 
                ecw: generateRandomScore(0.365, 0.395),
                hrv: {
                  balance: generateRandomScore(1, 5),
                  phyLoad: generateRandomScore(1, 5),
                  fatigue: generateRandomScore(1, 5),
                  lf: Math.floor(Math.random() * 800) + 200, 
                  hf: Math.floor(Math.random() * 800) + 200, 
                  rmssd: Math.floor(Math.random() * 60) + 20 
                },
                yBalance: {
                  left: Math.floor(Math.random() * 20) + 80,
                  right: Math.floor(Math.random() * 20) + 80,
                  score: Math.floor(Math.random() * 20) + 80,
                },
                ultrasound: {
                  achillesL: getRandomStatus(), achillesR: getRandomStatus(),
                  kneeL: getRandomStatus(), kneeR: getRandomStatus(),
                  footL: getRandomStatus(), footR: getRandomStatus()
                },
                riskLevel: {
                  phyLoadRisk: getRandomStatus(),
                  fatigueRisk: getRandomStatus(),
                  redSRisk: getRandomStatus()
                }
              },
              growth: { 
                boneAgeYear, 
                boneAgeMonth,
                boneAgeDecimal: Number(boneAgeDecimal.toFixed(1)),
                stage: boneAgeDecimal < 11.5 ? 'Pre-PHV' : boneAgeDecimal < 13 ? 'Stage 1' : 'Stage 2', 
                pah: generateRandomScore(172, 185) 
              }
            });
          });
        }
      });
      return data;
    };

    const GLOBAL_DATA = generateMockData();

    // 주기화 검진 아카이브
    const REPORT_ARCHIVE = {
      grade6: [
        { id: 'r6-1', grade: 6, dateCode: '2026-03', dateLabel: '2026년 3월', title: '1분기 정기평가', center: '서울신도림센터', status: '완료' },
        { id: 'r6-2', grade: 6, dateCode: '2026-06', dateLabel: '2026년 6월', title: '2분기 정기평가', center: '서울신도림센터', status: '완료' }
      ],
      grade5: [
        { id: 'r5-1', grade: 5, dateCode: '2026-03', dateLabel: '2026년 3월', title: '1분기 정기평가', center: '동탄센터', status: '완료' },
        { id: 'r5-2', grade: 5, dateCode: '2026-06', dateLabel: '2026년 6월', title: '2분기 정기평가', center: '동탄센터', status: '완료' }
      ]
    };

    // --- Components ---

    const StatusBadge = ({ status, minimal = false }) => {
      if (minimal) {
        switch(status) {
          case '위험': return <div className="w-2 h-2 rounded-full bg-[#e30613]" title="위험"></div>;
          case '주의': return <div className="w-2 h-2 rounded-full bg-[#fbbc04]" title="주의"></div>;
          default: return <div className="w-2 h-2 rounded-full bg-[#10b981]" title="양호"></div>;
        }
      }
      switch(status) {
        case '위험': return <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold bg-[#e30613]/10 text-[#e30613] border border-[#e30613]/20">위험</span>;
        case '주의': return <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold bg-[#fbbc04]/10 text-[#d97706] border border-[#fbbc04]/20">주의</span>;
        case '양호': return <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold bg-[#10b981]/10 text-[#10b981] border border-[#10b981]/20">양호</span>;
        default: return <span className="text-slate-300">-</span>;
      }
    };

    // 3줄 툴팁
    const InfoTooltip = ({ content }) => {
      const [show, setShow] = useState(false);
      return (
        <div className="relative inline-block ml-1" onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}>
          <div className="w-3.5 h-3.5 bg-slate-200 text-slate-500 rounded-full flex items-center justify-center text-[9px] font-bold cursor-help hover:bg-[#0b1c2d] hover:text-white transition-colors">
            i
          </div>
          {show && (
            <div className="absolute top-full left-1/2 transform -translate-x-1/2 mt-2 w-72 bg-[#0b1c2d] text-white text-xs p-3.5 rounded-lg shadow-2xl z-[100] normal-case font-normal leading-relaxed text-left border border-slate-700 whitespace-pre-wrap">
              <div className="absolute bottom-full left-1/2 transform -translate-x-1/2 mt-0 border-4 border-transparent border-b-[#0b1c2d]"></div>
              {content}
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [currentScreen, setCurrentScreen] = useState('LOGIN'); 
      const [loginTeam, setLoginTeam] = useState(TEAMS[0]);
      const [password, setPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      
      // 선택 상태
      const [selectedReport, setSelectedReport] = useState(null); 
      const [selectedPlayerId, setSelectedPlayerId] = useState(null); 

      // Dashboard States
      const [activeTab, setActiveTab] = useState('overview');
      const [sortConfig, setSortConfig] = useState({ key: 'name', direction: 'asc' });

      // 로그인 핸들러
      const handleLogin = (e) => {
        e.preventDefault();
        if (password === '1') {
          setLoginError('');
          setCurrentScreen('SELECTION');
        } else {
          setLoginError('비밀번호가 일치하지 않습니다.');
        }
      };

      const handleSelectReport = (report) => {
        if (report.status !== '완료') return;
        setSelectedReport(report);
        setActiveTab('overview');
        setCurrentScreen('DASHBOARD');
      };

      const handlePlayerClick = (playerId) => {
        setSelectedPlayerId(playerId);
        setCurrentScreen('PLAYER_DETAIL');
      };

      // --- Data Processing (DASHBOARD) ---
      const dashboardData = useMemo(() => {
        if (!selectedReport) return [];
        return GLOBAL_DATA.filter(p => 
          p.team === loginTeam && 
          p.grade === selectedReport.grade && 
          p.testDateCode === selectedReport.dateCode
        );
      }, [loginTeam, selectedReport]);

      const nationalStats = useMemo(() => {
        const avg = (keyFn) => Number((GLOBAL_DATA.reduce((sum, p) => sum + keyFn(p), 0) / GLOBAL_DATA.length).toFixed(1));
        return {
          tension: avg(p => p.mental.tension),
          support: avg(p => p.mental.support),
          prep: avg(p => p.mental.prep),
          recovery: avg(p => p.mental.recovery),
          focus: avg(p => p.mental.focus),
          stability: avg(p => p.mental.stability)
        };
      }, []);

      const europeStats = { tension: 5.2, support: 5.6, prep: 5.1, recovery: 5.3, focus: 5.0, stability: 5.4 };

      // 팀 평균 계산
      const teamStats = useMemo(() => {
        if (!dashboardData.length) return null;
        
        const avg = (keyFn) => Number((dashboardData.reduce((sum, p) => sum + keyFn(p), 0) / dashboardData.length).toFixed(1));
        const avg3 = (keyFn) => Number((dashboardData.reduce((sum, p) => sum + keyFn(p), 0) / dashboardData.length).toFixed(3));
        
        const riskPlayers = dashboardData.filter(p => 
          p.physical.riskLevel.redSRisk === '위험' || 
          p.physical.riskLevel.phyLoadRisk === '위험' || 
          p.physical.riskLevel.fatigueRisk === '위험'
        );

        const scatterData = dashboardData.map((p, index) => ({
          name: p.name,
          boneAgeDecimal: p.growth.boneAgeDecimal,
          yPos: (index % 5) + 1, 
          boneAgeText: `${p.growth.boneAgeYear}년 ${p.growth.boneAgeMonth}월`
        }));

        return {
          mental: {
            mgi: avg(p => p.mental.mgi),
            wmi: avg(p => p.mental.wmi),
            tension: avg(p => p.mental.tension),
            support: avg(p => p.mental.support),
            prep: avg(p => p.mental.prep),
            recovery: avg(p => p.mental.recovery),
            focus: avg(p => p.mental.focus),
            stability: avg(p => p.mental.stability)
          },
          physical: {
            weight: avg(p => p.weight),
            fat: avg(p => p.physical.fat),
            ecw: avg3(p => p.physical.ecw),
            yBalanceLeft: avg(p => p.physical.yBalance.left),
            yBalanceRight: avg(p => p.physical.yBalance.right),
            yBalanceScore: avg(p => p.physical.yBalance.score),
            hrvBalance: avg(p => p.physical.hrv.balance),
            hrvLf: avg(p => p.physical.hrv.lf),
            hrvHf: avg(p => p.physical.hrv.hf),
            hrvRmssd: avg(p => p.physical.hrv.rmssd)
          },
          growth: {
            height: avg(p => p.height),
            avgBoneAge: avg(p => p.growth.boneAgeDecimal), 
            pah: avg(p => p.growth.pah),
            scatterData: scatterData
          },
          physicalRiskPlayers: riskPlayers.slice(0, 5) 
        };
      }, [dashboardData]);

      // 정렬 로직
      const handleSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
        setSortConfig({ key, direction });
      };
      const getNestedValue = (obj, path) => path.split('.').reduce((acc, part) => acc && acc[part], obj);
      const processedData = useMemo(() => {
        const sorted = [...dashboardData].sort((a, b) => {
          const aValue = getNestedValue(a, sortConfig.key);
          const bValue = getNestedValue(b, sortConfig.key);
          if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
          if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
          return 0;
        });
        return sorted;
      }, [dashboardData, sortConfig]);


      // --- Data Processing (PLAYER_DETAIL) ---
      const playerHistoryData = useMemo(() => {
        if (!selectedPlayerId) return [];
        return GLOBAL_DATA.filter(p => p.playerId === selectedPlayerId)
          .sort((a, b) => a.testDateCode.localeCompare(b.testDateCode));
      }, [selectedPlayerId]);
      
      const currentPlayer = playerHistoryData[playerHistoryData.length - 1];


      // 공통 유틸
      const getScoreColor = (score) => {
        if (score >= 4.5) return 'text-[#10b981] font-bold'; 
        if (score >= 3.0) return 'text-[#fbbc04] font-bold'; 
        return 'text-[#e30613] font-bold'; 
      };
      const getEcwColor = (ecw) => {
        if (ecw >= 0.380) return 'text-[#e30613] font-black';
        return 'text-[#10b981] font-bold';
      };

      const ScatterTooltip = ({ active, payload }) => {
        if (active && payload && payload.length) {
          const data = payload[0].payload;
          return (
            <div className="bg-[#0b1c2d] text-white p-3 rounded-lg shadow-xl border border-slate-700 z-[100]">
              <p className="font-black text-sm mb-1">{data.name}</p>
              <p className="text-xs text-[#fbbc04]">뼈나이: {data.boneAgeText}</p>
            </div>
          );
        }
        return null;
      };


      // ==========================================
      // RENDER: LOGIN SCREEN
      // ==========================================
      if (currentScreen === 'LOGIN') {
        return (
          <div className="min-h-screen bg-[#0b1c2d] flex items-center justify-center relative overflow-hidden">
            <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#e30613] rounded-full blur-[150px] opacity-20"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#fbbc04] rounded-full blur-[150px] opacity-10"></div>
            <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5"></div>

            <div className="relative z-10 w-full max-w-md px-6">
              <div className="text-center mb-10">
                <div className="w-20 h-20 bg-gradient-to-br from-[#e30613] to-[#8a040b] rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl border border-white/10 transform rotate-3">
                  <Trophy className="w-10 h-10 text-white" />
                </div>
                <h1 className="text-4xl font-black text-white tracking-tight">MPS <span className="text-[#e30613]">PRO</span></h1>
                <p className="text-slate-400 mt-2 text-sm">Professional Team Analysis Center</p>
              </div>

              <form onSubmit={handleLogin} className="bg-white/10 backdrop-blur-xl p-8 rounded-3xl border border-white/10 shadow-2xl">
                <div className="mb-6">
                  <label className="block text-slate-300 text-xs font-bold mb-2 uppercase tracking-wider">소속 팀 선택</label>
                  <div className="relative">
                    <Shield className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                    <select 
                      className="w-full bg-[#0b1c2d]/50 border border-slate-600 text-white rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-[#e30613] focus:ring-1 focus:ring-[#e30613] transition-colors appearance-none font-semibold"
                      value={loginTeam}
                      onChange={(e) => setLoginTeam(e.target.value)}
                    >
                      {TEAMS.map(team => (
                        <option key={team} value={team}>{team}</option>
                      ))}
                    </select>
                    <ChevronDown className="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" />
                  </div>
                </div>

                <div className="mb-8">
                  <label className="block text-slate-300 text-xs font-bold mb-2 uppercase tracking-wider">액세스 코드</label>
                  <div className="relative">
                    <Lock className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                    <input 
                      type="password" 
                      placeholder="비밀번호 입력 (1)"
                      className="w-full bg-[#0b1c2d]/50 border border-slate-600 text-white rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-[#e30613] focus:ring-1 focus:ring-[#e30613] transition-colors font-medium placeholder-slate-500"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                    />
                  </div>
                  {loginError && <p className="text-[#e30613] text-xs font-bold mt-2 flex items-center"><AlertCircle className="w-3 h-3 mr-1" />{loginError}</p>}
                </div>

                <button 
                  type="submit" 
                  className="w-full bg-gradient-to-r from-[#e30613] to-[#c7000e] hover:from-[#c7000e] hover:to-[#a0000a] text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-[#e30613]/30 flex items-center justify-center uppercase tracking-widest text-sm"
                >
                  로그인
                  <ChevronRight className="w-4 h-4 ml-2" />
                </button>
              </form>
            </div>
          </div>
        );
      }


      // ==========================================
      // RENDER: SELECTION SCREEN
      // ==========================================
      if (currentScreen === 'SELECTION') {
        return (
          <div className="min-h-screen bg-[#f1f5f9] flex flex-col">
            <header className="bg-[#0b1c2d] text-white h-16 flex items-center justify-between px-8 shadow-md">
              <div className="flex items-center gap-3">
                <Trophy className="w-6 h-6 text-[#fbbc04]" />
                <h1 className="text-xl font-black tracking-widest uppercase">MPS PRO <span className="text-slate-500 mx-2">|</span> {loginTeam}</h1>
              </div>
              <button onClick={() => setCurrentScreen('LOGIN')} className="text-sm font-semibold text-slate-400 hover:text-white transition-colors">
                로그아웃
              </button>
            </header>

            <main className="flex-1 p-8 md:p-12 max-w-7xl mx-auto w-full">
              <div className="mb-10 text-center">
                <h2 className="text-3xl font-black text-[#0b1c2d] mb-2">주기화 검진 리포트 아카이브</h2>
                <p className="text-slate-500 font-medium">열람할 학년(연령대)과 측정 일자를 선택하세요.</p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                {/* 6학년 Column */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full">
                  <div className="bg-[#0b1c2d] p-4 text-center">
                    <h3 className="text-lg font-black text-white">6학년 (U12)</h3>
                    <p className="text-xs text-[#fbbc04] font-bold">2014년생 대상</p>
                  </div>
                  <div className="p-6 space-y-4 flex-1 bg-slate-50">
                    {REPORT_ARCHIVE.grade6.map(report => (
                      <button 
                        key={report.id}
                        onClick={() => handleSelectReport(report)}
                        disabled={report.status !== '완료'}

                              <td className="px-3 py-2.5 text-center text-slate-700 font-mono tracking-tighter border-r border-slate-100">{player.physical.hrv.rmssd}</td>

                              {/* 초음파 */}
                              <td className="px-3 py-2.5 text-center bg-purple-50/10">
                                <span className="flex items-center justify-center gap-1">
                                  <StatusBadge minimal status={player.physical.ultrasound.achillesL} />
                                  <StatusBadge minimal status={player.physical.ultrasound.achillesR} />
                                </span>
                              </td>
                              <td className="px-3 py-2.5 text-center bg-purple-50/10">
                                <span className="flex items-center justify-center gap-1">
                                  <StatusBadge minimal status={player.physical.ultrasound.kneeL} />
                                  <StatusBadge minimal status={player.physical.ultrasound.kneeR} />
                                </span>
                              </td>
                              <td className="px-3 py-2.5 text-center bg-purple-50/10 border-r border-slate-100">
                                <span className="flex items-center justify-center gap-1">
                                  <StatusBadge minimal status={player.physical.ultrasound.footL} />
                                  <StatusBadge minimal status={player.physical.ultrasound.footR} />
                                </span>
                              </td>

                              {/* 일반 리스크 */}
                              <td className="px-3 py-2.5 text-center bg-[#e30613]/5"><StatusBadge status={player.physical.riskLevel.redSRisk} /></td>
                              <td className="px-3 py-2.5 text-center bg-[#e30613]/5"><StatusBadge status={player.physical.riskLevel.phyLoadRisk} /></td>
                              <td className="px-3 py-2.5 text-center bg-[#e30613]/5 border-r border-slate-100"><StatusBadge status={player.physical.riskLevel.fatigueRisk} /></td>
                            </>
                          )}

                          {activeTab === 'growth' && (
                            <>
                              <td className="px-3 py-2.5 text-right bg-[#fbbc04]/5 font-bold text-[#0b1c2d]">{player.height.toFixed(1)}</td>
                              <td className="px-3 py-2.5 text-center bg-[#fbbc04]/5 text-[#d97706] font-bold">{player.growth.boneAgeYear}년 {player.growth.boneAgeMonth}월</td>
                              <td className="px-3 py-2.5 text-center bg-[#fbbc04]/5 font-bold text-slate-700 border-r border-slate-100">{player.growth.stage}</td>
                              <td className="px-3 py-2.5 text-right bg-[#0b1c2d]/5 font-black text-[#0b1c2d] text-sm">{player.growth.pah.toFixed(1)}</td>
                            </>
                          )}

                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                
                {/* 범례 푸터 (멘탈 탭에만 표시) */}
                {activeTab === 'mental' && (
                  <div className="bg-slate-50 border-t border-slate-200 px-4 py-2 flex items-center gap-4 text-[10px] text-slate-500 shrink-0 relative z-50">
                    <span className="font-bold text-slate-700">점수 범례:</span>
                    <span className="flex items-center"><div className="w-2 h-2 rounded-full bg-[#10b981] mr-1"></div> 우수 (4.5 이상)</span>
                    <span className="flex items-center"><div className="w-2 h-2 rounded-full bg-[#fbbc04] mr-1"></div> 보통 (3.0 ~ 4.4)</span>
                    <span className="flex items-center"><div className="w-2 h-2 rounded-full bg-[#e30613] mr-1"></div> 취약 (3.0 미만)</span>
                  </div>
                )}

              </div>
            )}
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
