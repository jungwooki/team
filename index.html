<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPS PRO | Coach Command Center</title>

  <!-- Pretendard 폰트 로드 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel 컴파일러 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 모듈 Import Map -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react",
        "recharts": "https://esm.sh/recharts@2.10.3?external=react,react-dom"
      }
    }
  </script>

  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .matrix-bg {
      background-image: 
        linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
      background-size: 50% 50%;
    }
  </style>
</head>
<body>
  <div id="root" class="min-h-screen w-full flex flex-col"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Brain, Activity, Bone, AlertCircle, Trophy, Shield, 
      TrendingUp, TrendingDown, LayoutGrid, HeartPulse, 
      Flame, Calendar, BatteryCharging, Zap, Target, ArrowUpDown,
      ArrowLeft, ChevronUp, ChevronDown, CheckCircle2, ShieldAlert, X
    } from 'lucide-react';
    import {
      CartesianGrid, Tooltip as RechartsTooltip, ResponsiveContainer,
      ScatterChart, Scatter, XAxis, YAxis, ZAxis, ReferenceArea, ReferenceLine,
      RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar, Legend
    } from 'recharts';

    // ==========================================
    // 1. DATA GENERATION & DICTIONARY
    // ==========================================
    const TEAM_NAME = '해온FC';
    const TEST_DATES = ['2026-01-22', '2026-04-22'];
    const POSITIONS = ['FW', 'MF', 'DF', 'GK'];
    const LAST_NAMES = ['김', '이', '박', '최', '정', '강', '조', '윤', '장', '임', '한', '오', '서'];
    const FIRST_NAMES = ['민준', '서준', '도윤', '예준', '시우', '하준', '지호', '주원', '건우', '우진', '선우', '서진'];

    const MENTAL_INFO = {
      tension: { title: '수행불안(긴장)', desc: '압박 상황에서도 마음을 정리하고 플레이를 이어가는 힘입니다.', context: '경기 전후로 발생하는 압박감과 불안감을 스스로 인지하고 통제합니다.' },
      support: { title: '지원환경(도움)', desc: '어려움이 생겼을 때, 주변(코치, 부모, 동료)의 도움을 적절히 구하는 능력입니다.', context: '경기 결과보다 과정과 감정을 소통하며 심리적 지지를 얻습니다.' },
      prep: { title: '경기 준비 능력', desc: '목표 설정과 이미지 트레이닝처럼 경기 전 준비의 질을 의미합니다.', context: '경기 전 루틴을 철저히 수행하며 신체적/심리적으로 완벽히 대비합니다.' },
      recovery: { title: '실수 후 회복력', desc: '실수 뒤 감정에 오래 머물지 않고 다시 경기로 돌아오는 힘입니다.', context: '경기 중 패스 미스나 턴오버 후 즉시 다음 수비나 임무로 전환합니다.' },
      focus: { title: '자기조절 집중력', desc: '감정과 충동이 흔들릴 때 다시 해야 할 것에 집중하는 힘입니다.', context: '감정이 격해지더라도 팀 전술적 원칙과 포지션을 끝까지 책임집니다.' },
      matchStab: { title: '경기 안정성', desc: '긴장 속에서도 플레이 흐름을 유지하는 능력입니다.', context: '실수 직후, 강한 압박을 받을 때, 경기 템포가 빨라질 때 흔들리지 않습니다.' },
      mentalStab: { title: '심리 안정성', desc: '감정 변화와 스트레스 속에서도 마음의 균형을 찾는 능력입니다.', context: '실점 직후, 벤치 반응이나 관중 소음이 신경 쓰일 때 정서적 흔들림을 제어합니다.' },
      indep: { title: '평가 독립성', desc: '타인의 평가보다 자신의 기준으로 플레이를 유지하는 능력입니다.', context: '부모, 코치, 동료의 반응에 흔들리지 않고 내 역할과 플레이 원칙을 지킵니다.' },
      selfLearn: { title: '자기조절 학습', desc: '훈련을 스스로 계획하고 개선하려는 학습 태도입니다.', context: '훈련 목표를 명확히 설정하고 자신의 플레이를 돌아보며 다음 연습으로 연결합니다.' },
      imagery: { title: '심상 훈련 활용', desc: '경기 장면을 머릿속으로 그리며 준비하는 능력입니다.', context: '침투 타이밍, 돌파, 슈팅 전후 장면을 실제 상황 전에 머릿속으로 생생히 재생합니다.' },
      adapt: { title: '주위 적응력', desc: '새로운 환경과 팀 상황에 적응하는 능력입니다.', context: '포지션 변화, 새로운 팀 분위기, 지시 변화 속에서 혼란 없이 자연스럽게 녹아듭니다.' },
      failRec: { title: '실패 후 회복력', desc: '치명적인 실책 등 거대한 실패 상황에 직면했을 때 심리적 붕괴를 막는 강인함입니다.', context: '결정적 실점 관여, 패배 직전 위기 상황에서도 투지를 잃지 않고 템포를 살립니다.' },
      attitude: { title: '훈련 태도', desc: '훈련에 대한 몰입과 지속적인 노력 태도입니다.', context: '힘든 체력 훈련이나 컨디션이 좋지 않은 날에도 기본 집중력과 실행력을 유지합니다.' }
    };

    const generateRandomScore = (min, max) => Number((Math.random() * (max - min) + min).toFixed(1));
    const getRiskStatus = (probability) => Math.random() < probability ? '위험' : (Math.random() < probability * 2 ? '주의' : '양호');
    const to100 = (val) => Math.round((val / 6) * 100);

    const calculateCoachMetrics = (physical, mental, growth, baseAvail = null) => {
      let availability = baseAvail !== null ? baseAvail : generateRandomScore(70, 98);
      if (physical.riskLevel.fatigueRisk === '위험') availability -= 15;
      if (physical.riskLevel.phyLoadRisk === '위험') availability -= 15;
      if (physical.riskLevel.redSRisk === '위험') availability -= 10;
      availability = Math.max(0, Math.min(100, availability));

      let coachScore = (mental.mgi * 10) * 0.4 + availability * 0.6; 
      
      let stageText = 'Pre-PHV';
      let stageScore = 2; 
      if (growth.boneAgeDecimal >= 11.5 && growth.boneAgeDecimal < 13.5) {
        stageText = 'PHV (급성장)';
        stageScore = 5;
      } else if (growth.boneAgeDecimal >= 13.5) {
        stageText = 'Post-PHV (완성)';
        stageScore = 8;
      }
      stageScore = Math.max(0, Math.min(10, stageScore + generateRandomScore(-1.5, 1.5)));

      return { availability: Math.round(availability), coachScore: Math.round(coachScore), stageText, stageScore: Number(stageScore.toFixed(1)) };
    };

    const generateMockData = () => {
      const data = [];
      const playerCount = 22;

      for (let i = 0; i < playerCount; i++) {
        const playerId = `P${String(i+1).padStart(3, '0')}`;
        const name = LAST_NAMES[Math.floor(Math.random() * LAST_NAMES.length)] + FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)];
        const position = POSITIONS[i % POSITIONS.length];
        
        let height = generateRandomScore(155, 175);
        let weight = generateRandomScore(45, 65);
        let boneAgeDecimal = generateRandomScore(11.0, 15.0);
        let pah = height + generateRandomScore(3, 22);

        let baseMental = generateRandomScore(3.0, 5.5);
        let baseAvail = generateRandomScore(75, 95);

        TEST_DATES.forEach((date, idx) => {
          if (idx === 1) {
            height += generateRandomScore(0.5, 3.5); 
            weight += generateRandomScore(0.5, 2.0);
            boneAgeDecimal += 0.25;
            baseMental = Math.max(1, Math.min(6, baseMental + generateRandomScore(-0.8, 0.8)));
            baseAvail = Math.max(50, Math.min(100, baseAvail + generateRandomScore(-15, 15)));
          }

          const mental = {
            mgi: Number(baseMental.toFixed(1)),
            major: {
              tension: Number((baseMental + generateRandomScore(-0.6, 0.6)).toFixed(1)),
              support: Number((baseMental + generateRandomScore(-0.6, 0.6)).toFixed(1)),
              prep:    Number((baseMental + generateRandomScore(-0.6, 0.6)).toFixed(1)),
              recovery:Number((baseMental + generateRandomScore(-0.6, 0.6)).toFixed(1)),
              focus:   Number((baseMental + generateRandomScore(-0.6, 0.6)).toFixed(1)),
            },
            detail: {
              matchStab: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              mentalStab: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              indep: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              selfLearn: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              imagery: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              adapt: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              failRec: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
              attitude: Number((baseMental + generateRandomScore(-0.8, 0.8)).toFixed(1)),
            }
          };

          const physical = {
            riskLevel: {
              phyLoadRisk: getRiskStatus(0.15), fatigueRisk: getRiskStatus(0.2), redSRisk: getRiskStatus(0.05)
            },
            ultrasound: {
              kneeL: getRiskStatus(0.15), kneeR: getRiskStatus(0.15),
              achillesL: getRiskStatus(0.1), achillesR: getRiskStatus(0.1),
              plantarL: getRiskStatus(0.05), plantarR: getRiskStatus(0.05)
            },
            recoveryScore: Math.round(generateRandomScore(60, 95))
          };

          const growth = { boneAgeDecimal: Number(boneAgeDecimal.toFixed(1)), pah: Number(pah.toFixed(1)) };
          const coachMetrics = calculateCoachMetrics(physical, mental, growth, baseAvail);

          data.push({
            id: `${playerId}-${date}`, playerId, name, position, date,
            height: Number(height.toFixed(1)), weight: Number(weight.toFixed(1)),
            mental, physical, growth, coach: coachMetrics, mental100: to100(mental.mgi)
          });
        });
      }
      return data;
    };

    const RAW_DATA = generateMockData();

    const MENTAL_NAMES = {
      tension: '수행불안(긴장)', support: '지원환경(도움)', prep: '경기 준비 능력', recovery: '실수 후 회복력', focus: '자기조절 집중력',
      matchStab: '경기 안정성', mentalStab: '심리 안정성', indep: '평가 독립성', selfLearn: '자기조절 학습', 
      imagery: '심상 훈련 활용', adapt: '주위 적응력', failRec: '실패 후 회복력', attitude: '훈련 태도'
    };

    // ==========================================
    // 2. DATA PROCESSING HOOK
    // ==========================================
    function useSquadData() {
      return useMemo(() => {
        const currentData = RAW_DATA.filter(d => d.date === TEST_DATES[1]);
        const pastData = RAW_DATA.filter(d => d.date === TEST_DATES[0]);

        const players = currentData.map(curr => {
          const past = pastData.find(p => p.playerId === curr.playerId);
          return {
            ...curr,
            diff: {
              height: past ? Number((curr.height - past.height).toFixed(1)) : 0,
              availability: past ? curr.coach.availability - past.coach.availability : 0,
              mgi100: past ? (curr.mental100 - to100(past.mental.mgi)) : 0,
              coachScore: past ? curr.coach.coachScore - past.coach.coachScore : 0
            },
            past: past || null
          };
        });

        const calcAvg = (arr, keyFn) => Number((arr.reduce((sum, item) => sum + keyFn(item), 0) / arr.length).toFixed(1));
        
        const currentStats = {
          availability: calcAvg(players, p => p.coach.availability),
          mgi100: Math.round(calcAvg(players, p => p.mental100)),
          riskCount: players.filter(p => p.physical.riskLevel.fatigueRisk === '위험' || p.physical.riskLevel.phyLoadRisk === '위험').length,
          growthSpurtCount: players.filter(p => p.coach.stageText === 'PHV (급성장)').length,
          mentalMajor: {
            tension: calcAvg(players, p => p.mental.major.tension),
            support: calcAvg(players, p => p.mental.major.support),
            prep: calcAvg(players, p => p.mental.major.prep),
            recovery: calcAvg(players, p => p.mental.major.recovery),
            focus: calcAvg(players, p => p.mental.major.focus),
          }
        };

        const pastStats = {
          availability: calcAvg(pastData, p => p.coach.availability),
          mgi100: Math.round(calcAvg(pastData, p => to100(p.mental.mgi))),
          riskCount: pastData.filter(p => p.physical.riskLevel.fatigueRisk === '위험' || p.physical.riskLevel.phyLoadRisk === '위험').length,
          growthSpurtCount: pastData.filter(p => p.coach.stageText === 'PHV (급성장)').length,
        };

        const positions = POSITIONS.map(pos => {
          const posPlayers = players.filter(p => p.position === pos);
          if(posPlayers.length === 0) return null;
          return {
            position: pos,
            loadAvg: posPlayers.filter(p => p.physical.riskLevel.phyLoadRisk === '위험').length,
            mgi100Avg: Math.round(calcAvg(posPlayers, p => p.mental100)),
            availAvg: calcAvg(posPlayers, p => p.coach.availability),
            major: {
              tension: calcAvg(posPlayers, p => p.mental.major.tension),
              support: calcAvg(posPlayers, p => p.mental.major.support),
              prep: calcAvg(posPlayers, p => p.mental.major.prep),
              recovery: calcAvg(posPlayers, p => p.mental.major.recovery),
              focus: calcAvg(posPlayers, p => p.mental.major.focus),
            }
          };
        }).filter(Boolean);

        return { 
          players, 
          stats: { 
            current: currentStats, 
            diff: { 
              availability: Number((currentStats.availability - pastStats.availability).toFixed(1)), 
              mgi100: currentStats.mgi100 - pastStats.mgi100, 
              riskCount: currentStats.riskCount - pastStats.riskCount, 
              growthSpurtCount: currentStats.growthSpurtCount - pastStats.growthSpurtCount 
            } 
          }, 
          positions 
        };
      }, []);
    }

    // ==========================================
    // 3. UI COMPONENTS & UTILS
    // ==========================================
    
    // 하단 고정 안내/면책 조항 컴포넌트
    const DisclaimerFooter = () => (
      <div className="mt-8 pt-4 pb-6 border-t border-slate-200/60 w-full shrink-0">
        <div className="max-w-6xl mx-auto px-4 text-[9px] text-slate-400 leading-relaxed text-left space-y-1 opacity-80">
          <p>1. (주)주니어골든에이지는 IT 플랫폼 제공사이며, 의료기관, 스포츠평가기관이 아닙니다.</p>
          <p>2. 플랫폼 내 리포트는 제휴 의료기관에서 측정된 데이터를 기반으로 스포츠관점에서 시각화된 정보이며, 절대적인 의학적 진단이나 치료를 대신하지 않습니다.</p>
          <p>3. 실제 의료 검진(초음파 판독 등) 및 그에 따른 의학적 책임은 해당 행위를 직접 수행한 독립된 제휴 의료기관 소속 의료진에게 있습니다.</p>
          <p>4. 본 플랫폼에 있는 스포츠 정보는 플랫폼 사용자의 이해를 돕기위한 참고정보로만 활용하도록 구성되어있습니다. (이해를 돕기 위해 변형된 부분도 있습니다)</p>
        </div>
      </div>
    );

    const getMentalRiskStatus = (score) => {
      if (score >= 4.5) return { label: '안정', color: 'text-[#10b981]', bg: 'bg-[#10b981]/10', border: 'border-[#10b981]/30' };
      if (score >= 3.0) return { label: '주의', color: 'text-[#fbbc04]', bg: 'bg-[#fbbc04]/10', border: 'border-[#fbbc04]/30' };
      return { label: '위험', color: 'text-[#e30613]', bg: 'bg-[#e30613]/10', border: 'border-[#e30613]/30' };
    };

    const getSignalLight = (status) => {
      if (status === '위험') return 'bg-[#e30613] shadow-[0_0_5px_#e30613]';
      if (status === '주의') return 'bg-[#fbbc04] shadow-[0_0_5px_#fbbc04]';
      return 'bg-[#10b981] shadow-[0_0_5px_#10b981]';
    }

    const ScoreBar100 = ({ label, score, colorClass, showLabel = true }) => (
      <div className="flex items-center gap-2">
        {showLabel && <div className="w-14 text-right text-[11px] font-bold text-slate-500 truncate">{label}</div>}
        <div className="flex-1 h-2 bg-slate-200 rounded-full overflow-hidden">
          <div className={`h-full ${colorClass} transition-all duration-700 ease-out`} style={{ width: `${score}%` }}></div>
        </div>
        <div className="w-8 text-right text-[11px] font-black text-[#0b1c2d]">{score}점</div>
      </div>
    );

    const TrendIndicator = ({ value, unit = '', reverseColors = false }) => {
      const isPositive = value > 0;
      const isNeutral = value === 0;
      const displayValue = Math.abs(value);
      
      let colorClass = "text-slate-400";
      if (!isNeutral) {
        colorClass = reverseColors 
          ? (isPositive ? "text-[#e30613]" : "text-[#10b981]") 
          : (isPositive ? "text-[#10b981]" : "text-[#e30613]");
      }

      return (
        <span className={`inline-flex items-center text-[10px] font-bold px-1 py-0.5 rounded bg-slate-50 ${colorClass}`}>
          {isPositive ? <TrendingUp className="w-2.5 h-2.5 mr-0.5" /> : (!isNeutral && <TrendingDown className="w-2.5 h-2.5 mr-0.5" />)}
          {isNeutral ? '-' : `${displayValue}${unit}`}
        </span>
      );
    };

    const KpiCard = ({ title, value, unit, diff, desc, icon: Icon, color, reverseColors=false, onClick }) => {
      const colorMap = { blue: "text-blue-600 bg-blue-50", red: "text-[#e30613] bg-[#e30613]/10", indigo: "text-indigo-600 bg-indigo-50", amber: "text-[#d97706] bg-[#fbbc04]/10" };
      return (
        <div onClick={onClick} className={`bg-white rounded-xl p-3 border border-slate-200 shadow-sm flex flex-col justify-between h-full ${onClick ? 'cursor-pointer hover:border-blue-400 hover:shadow-md transition-all' : ''}`}>
          <div className="flex justify-between items-start mb-1">
            <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-tight">{title}</h3>
            <div className={`p-1.5 rounded-md ${colorMap[color]}`}><Icon className="w-3.5 h-3.5" /></div>
          </div>
          <div className="flex items-end gap-2 mb-1">
            <div className="text-xl font-black text-[#0b1c2d] leading-none">{value}<span className="text-[10px] text-slate-400 font-bold ml-0.5">{unit}</span></div>
            <TrendIndicator value={diff} reverseColors={reverseColors} />
          </div>
          <p className="text-[9px] font-bold text-slate-400 truncate">{desc}</p>
        </div>
      );
    };

    const DotWithLabel = (props) => {
      const { cx, cy, payload, onClick } = props;
      let dotColor = "#cbd5e1";
      if (payload.coach.coachScore >= 60 && payload.coach.stageScore < 5) dotColor = "#10b981";

          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            <ActionListCard title="관리/휴식 요망" players={topRisks} valueKey="coach.availability" unit="점" isWarning={true} onPlayerClick={setSelectedPlayerId} />
            <ActionListCard title="즉시 전력 추천" players={topReady} valueKey="coach.coachScore" unit="점" onPlayerClick={setSelectedPlayerId} />
            <ActionListCard title="3개월 최대 성장" players={topGrowths} valueKey="diff.height" unit="cm" isPlus={true} onPlayerClick={setSelectedPlayerId} />
          </div>
        </div>
      );

      const renderAvailabilityTab = () => (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col animate-in fade-in duration-300 mb-4">
          <div className="p-3 border-b border-slate-100">
            <h3 className="text-sm font-black text-[#0b1c2d] flex items-center gap-1.5">
              <BatteryCharging className="w-4 h-4 text-[#10b981]" />
              전체 스쿼드 가용성 평가 (Availability)
            </h3>
            <p className="text-[10px] text-slate-500 font-medium">피로, 부하, 부상 위험을 종합한 100점 만점 출전 가능성 지표입니다. 이름을 클릭하면 상세 분석이 나옵니다.</p>
          </div>
          <div className="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            {[...players].sort((a, b) => a.coach.availability - b.coach.availability).map(player => {
              let barColor = "bg-[#10b981]";
              if (player.coach.availability < 60) barColor = "bg-[#e30613]";
              else if (player.coach.availability < 80) barColor = "bg-[#fbbc04]";

              return (
                <div key={player.playerId} className="bg-slate-50 rounded-lg p-3 border border-slate-100 flex flex-col justify-center">
                  <div className="flex justify-between items-center mb-1.5">
                    <div className="flex items-center gap-2 cursor-pointer group" onClick={() => setSelectedPlayerId(player.playerId)}>
                      <span className="font-black text-sm text-blue-600 group-hover:underline">{player.name}</span>
                      <span className="text-[9px] text-slate-400 bg-white border border-slate-200 px-1 rounded">{player.position}</span>
                    </div>
                    <TrendIndicator value={player.diff.availability} />
                  </div>
                  <ScoreBar100 label="출전 가능성" score={player.coach.availability} colorClass={barColor} showLabel={false} />
                  <div className="flex gap-1.5 mt-2 pt-2 border-t border-slate-200">
                    {player.physical.riskLevel.phyLoadRisk === '위험' && <span className="text-[9px] bg-[#e30613]/10 text-[#e30613] font-bold px-1.5 py-0.5 rounded">부하위험</span>}
                    {player.physical.riskLevel.fatigueRisk === '위험' && <span className="text-[9px] bg-[#fbbc04]/20 text-[#d97706] font-bold px-1.5 py-0.5 rounded">피로누적</span>}
                    {player.physical.riskLevel.redSRisk === '위험' && <span className="text-[9px] bg-purple-100 text-purple-700 font-bold px-1.5 py-0.5 rounded">에너지부족</span>}
                    {(player.physical.riskLevel.phyLoadRisk !== '위험' && player.physical.riskLevel.fatigueRisk !== '위험' && player.physical.riskLevel.redSRisk !== '위험') && <span className="text-[9px] text-slate-400 font-bold">특이사항 없음</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );

      const renderGrowthTab = () => {
        const sortedGrowth = [...players].sort((a, b) => {
          let valA, valB;
          if (bioSort.key === 'name') { valA = a.name; valB = b.name; }
          else if (bioSort.key === 'boneAge') { valA = a.growth.boneAgeDecimal; valB = b.growth.boneAgeDecimal; }
          else if (bioSort.key === 'remain') { valA = a.growth.pah - a.height; valB = b.growth.pah - b.height; }

          if (valA < valB) return bioSort.dir === 'asc' ? -1 : 1;
          if (valA > valB) return bioSort.dir === 'asc' ? 1 : -1;
          return 0;
        });

        return (
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col animate-in fade-in duration-300 mb-4">
             <div className="p-3 border-b border-slate-100 flex justify-between items-center">
              <div>
                <h3 className="text-sm font-black text-[#0b1c2d] flex items-center gap-1.5">
                  <TrendingUp className="w-4 h-4 text-[#fbbc04]" />
                  바이오밴딩 (성장단계 & 잠재력)
                </h3>
                <p className="text-[10px] text-slate-500 font-medium">선수 이름을 클릭하면 상세 분석 페이지로 이동합니다.</p>
              </div>
              <div className="flex bg-slate-100 p-0.5 rounded-lg border border-slate-200 gap-0.5">
                <button onClick={() => handleBioSort('name')} className={`px-2 py-1 text-[10px] font-bold rounded flex items-center transition-colors ${bioSort.key === 'name' ? 'bg-white text-[#0b1c2d] shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                  이름별 {getSortIcon('name')}
                </button>
                <button onClick={() => handleBioSort('boneAge')} className={`px-2 py-1 text-[10px] font-bold rounded flex items-center transition-colors ${bioSort.key === 'boneAge' ? 'bg-white text-[#0b1c2d] shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                  뼈나이순 {getSortIcon('boneAge')}
                </button>
                <button onClick={() => handleBioSort('remain')} className={`px-2 py-1 text-[10px] font-bold rounded flex items-center transition-colors ${bioSort.key === 'remain' ? 'bg-white text-[#0b1c2d] shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                  남은성장량 {getSortIcon('remain')}
                </button>
              </div>
            </div>
            <div className="p-4">
              <div className="space-y-3 max-w-5xl mx-auto">
                {sortedGrowth.map((player, idx) => {
                  const remain = player.growth.pah - player.height;
                  const currentRatio = (player.height / 195) * 100;
                  const remainRatio = (remain / 195) * 100;
                  const baYear = Math.floor(player.growth.boneAgeDecimal);
                  const baMonth = Math.round((player.growth.boneAgeDecimal % 1) * 12);

                  return (
                    <div key={player.playerId} className="flex items-center gap-3 bg-slate-50 hover:bg-slate-100 p-3 rounded-lg transition-colors border border-slate-100">
                      <div className="w-5 text-center text-xs font-bold text-slate-300">{idx + 1}</div>
                      <div className="w-20 cursor-pointer group" onClick={() => setSelectedPlayerId(player.playerId)}>
                        <div className="font-black text-sm text-blue-600 group-hover:underline">{player.name}</div>
                        <div className="text-[10px] text-[#d97706] font-bold bg-[#fbbc04]/10 px-1 py-0.5 rounded inline-block mt-0.5">{player.coach.stageText}</div>
                      </div>
                      
                      <div className="w-24 text-center border-r border-slate-200 pr-3">
                        <div className="text-[10px] text-slate-400 mb-0.5">뼈나이</div>
                        <div className="text-sm font-black text-slate-700">{baYear}년 {baMonth}월</div>
                      </div>

                      <div className="flex-1 relative pl-4">
                        <div className="flex justify-between text-xs font-bold text-slate-500 mb-1">
                          <span>현재 {player.height.toFixed(1)}cm</span>
                          <span className="text-[#d97706]">남은여지 <span className="font-black text-base">{remain.toFixed(1)}</span>cm (목표 {player.growth.pah}cm)</span>
                        </div>
                        <div className="h-4 bg-white border border-slate-200 rounded-full flex overflow-hidden w-full">
                          <div className="h-full bg-slate-800 rounded-l-full relative" style={{ width: `${currentRatio}%` }}></div>
                          <div className="h-full bg-[#fbbc04]" style={{ width: `${remainRatio}%` }}></div>
                        </div>
                      </div>

                      <div className="w-20 text-right pl-3 border-l border-slate-200">
                        <div className="text-[10px] text-slate-400 mb-0.5">최근 3개월</div>
                        <div className="text-xs font-black text-[#e30613] bg-[#e30613]/10 px-1.5 py-0.5 rounded inline-block">+{player.diff.height}cm</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      const renderMentalTab = () => {
        const radarData = [
          { subject: '긴장관리', team: to100(stats.current.mentalMajor.tension), national: 71, fullMark: 100 },
          { subject: '지원환경', team: to100(stats.current.mentalMajor.support), national: 74, fullMark: 100 },
          { subject: '준비능력', team: to100(stats.current.mentalMajor.prep), national: 73, fullMark: 100 },
          { subject: '실수회복', team: to100(stats.current.mentalMajor.recovery), national: 68, fullMark: 100 },
          { subject: '집중조절', team: to100(stats.current.mentalMajor.focus), national: 72, fullMark: 100 },
        ];

        return (
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 animate-in fade-in duration-300 mb-4">
            <div className="bg-[#0b1c2d] rounded-xl shadow-sm border border-slate-700 p-4 text-white flex flex-col md:col-span-1 min-h-[350px]">
              <h3 className="text-sm font-black flex items-center gap-1.5 mb-2 text-slate-100 shrink-0">
                <Brain className="w-4 h-4 text-indigo-400" />
                팀 평균 5대 심리지표 (100점 만점)
              </h3>
              <div className="flex-1 w-full relative min-h-[250px] bg-slate-900/50 rounded-xl mt-2 p-2">
                <ResponsiveContainer width="100%" height="100%">
                  <RadarChart cx="50%" cy="50%" outerRadius="65%" data={radarData}>
                    <PolarGrid stroke="#334155" />
                    <PolarAngleAxis dataKey="subject" tick={{ fill: '#94a3b8', fontSize: 10, fontWeight: 'bold' }} />
                    <PolarRadiusAxis angle={30} domain={[0, 100]} tick={{ fill: '#475569', fontSize: 8 }} />
                    <Radar name="팀 평균" dataKey="team" stroke="#818cf8" fill="#818cf8" fillOpacity={0.5} strokeWidth={2} />
                    <Radar name="전국 평균" dataKey="national" stroke="#94a3b8" fill="#94a3b8" fillOpacity={0.2} strokeDasharray="3 3" />
                    <Legend wrapperStyle={{ fontSize: '10px', marginTop: '10px' }} />
                    <RechartsTooltip contentStyle={{backgroundColor: '#1e293b', border: 'none', borderRadius: '8px', color: '#fff', fontSize: '11px'}} itemStyle={{color: '#fff', fontWeight: 'bold'}}/>
                  </RadarChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col md:col-span-2">
              <div className="p-4 border-b border-slate-100 shrink-0">
                <h3 className="text-sm font-black text-[#0b1c2d] flex items-center gap-1.5">
                  <Shield className="w-4 h-4 text-slate-600" />
                  포지션별 멘탈 세부 지표 (100점 만점 환산)
                </h3>
                <p className="text-[10px] text-slate-500 font-medium">각 포지션의 5대 심리지표 밸런스와 평균 MGI를 확인하세요.</p>
              </div>
              <div className="flex-1 overflow-x-auto p-4 custom-scrollbar">
                <table className="w-full text-left whitespace-nowrap min-w-max">
                  <thead className="text-xs text-slate-500 font-bold bg-slate-50">
                    <tr>
                      <th className="px-3 py-2 rounded-l-md border-b border-slate-200">포지션</th>
                      <th className="px-3 py-2 text-center border-b border-slate-200 text-indigo-600">평균 MGI</th>
                      <th className="px-3 py-2 border-b border-slate-200">긴장관리</th>
                      <th className="px-3 py-2 border-b border-slate-200">지원환경</th>
                      <th className="px-3 py-2 border-b border-slate-200">준비능력</th>
                      <th className="px-3 py-2 border-b border-slate-200">실수회복</th>
                      <th className="px-3 py-2 rounded-r-md border-b border-slate-200">집중조절</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-sm">
                    {positions.map(pos => {
                      return (
                        <tr key={pos.position} className="hover:bg-slate-50">
                          <td className="px-3 py-3 font-black text-[#0b1c2d]">{pos.position}</td>
                          <td className="px-3 py-3 text-center">
                            <span className="font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded">{pos.mgi100Avg}점</span>
                          </td>
                          <td className="px-3 py-3 w-32"><ScoreBar100 score={to100(pos.major.tension)} colorClass="bg-blue-400" showLabel={false} /></td>
                          <td className="px-3 py-3 w-32"><ScoreBar100 score={to100(pos.major.support)} colorClass="bg-emerald-400" showLabel={false} /></td>
                          <td className="px-3 py-3 w-32"><ScoreBar100 score={to100(pos.major.prep)} colorClass="bg-amber-400" showLabel={false} /></td>
                          <td className="px-3 py-3 w-32"><ScoreBar100 score={to100(pos.major.recovery)} colorClass="bg-rose-400" showLabel={false} /></td>
                          <td className="px-3 py-3 w-32"><ScoreBar100 score={to100(pos.major.focus)} colorClass="bg-purple-400" showLabel={false} /></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen w-full flex flex-col bg-[#f1f5f9] relative">
          
          <header className="bg-[#0b1c2d] text-white h-14 flex items-center justify-between px-6 shrink-0 shadow z-40 sticky top-0">
            <div className="flex items-center gap-4">
              <div className="w-8 h-8 bg-gradient-to-br from-[#e30613] to-[#8a040b] rounded-lg flex items-center justify-center shadow-inner border border-white/10">
                <Trophy className="w-4 h-4 text-white" />
              </div>
              <div className="flex items-baseline gap-2">
                <h1 className="text-base font-black tracking-wider">MPS <span className="text-[#e30613]">PRO</span></h1>
                <span className="text-slate-600 font-bold text-sm">|</span>
                <span className="font-bold text-[#fbbc04] text-sm">{TEAM_NAME}</span>
              </div>
            </div>
            <div className="flex items-center text-[10px] text-slate-400 font-bold bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
              <Calendar className="w-3 h-3 mr-1" />
              최근: {TEST_DATES[1]} <span className="mx-2 opacity-50">|</span> 이전: {TEST_DATES[0]}
            </div>
          </header>

          <main className="flex-1 flex flex-col p-4 max-w-[1600px] mx-auto w-full relative z-0 overflow-y-auto custom-scrollbar">
            
            <div className="flex flex-col lg:flex-row gap-4 mb-4">
              <div className="lg:w-1/4 bg-white rounded-xl p-4 shadow-sm border-l-4 border-[#e30613] flex flex-col justify-center">
                <div className="flex items-center gap-1.5 mb-2 text-[#e30613]">
                  <Zap className="w-4 h-4" />
                  <h2 className="font-black text-[10px] uppercase tracking-wider">AI Coach Summary</h2>
                </div>
                <p className="text-xs font-bold text-[#0b1c2d] leading-relaxed">{generateSummary()}</p>
              </div>
              <div className="lg:w-3/4 grid grid-cols-2 md:grid-cols-4 gap-4">
                <KpiCard title="가용성 평균" value={stats.current.availability} unit="점" diff={stats.diff.availability} icon={Activity} color="blue" />
                <KpiCard title="관리 필요군" value={stats.current.riskCount} unit="명" diff={stats.diff.riskCount} reverseColors={true} icon={Flame} color="red" onClick={() => setActiveModal('risk')} />
                <KpiCard title="멘탈(MGI)" value={stats.current.mgi100} unit="점" diff={stats.diff.mgi100} icon={Brain} color="indigo" />
                <KpiCard title="급성장(PHV)" value={stats.current.growthSpurtCount} unit="명" diff={stats.diff.growthSpurtCount} icon={TrendingUp} color="amber" onClick={() => setActiveModal('growth')} />
              </div>
            </div>

            <div className="flex gap-2 mb-4 shrink-0">
              {tabs.map(tab => {
                const Icon = tab.icon;
                const isActive = activeTab === tab.id;
                return (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex items-center px-4 py-2 rounded-md text-xs font-black transition-all ${
                      isActive 
                        ? 'bg-[#0b1c2d] text-white shadow-md' 
                        : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 hover:text-[#0b1c2d]'
                    }`}
                  >
                    <Icon className={`w-3.5 h-3.5 mr-1.5 ${isActive ? 'text-[#fbbc04]' : 'text-slate-400'}`} />
                    {tab.title}
                  </button>
                )
              })}
            </div>

            <div className="flex-1 w-full">
              {activeTab === 'matrix' && renderMatrixTab()}
              {activeTab === 'availability' && renderAvailabilityTab()}
              {activeTab === 'growth' && renderGrowthTab()}
              {activeTab === 'mental' && renderMentalTab()}
            </div>

            {/* 대시보드 공통 하단 Disclaimer */}
            <DisclaimerFooter />

            {/* --- 명단 모달 팝업 --- */}
            {activeModal && (
              <div className="fixed inset-0 bg-[#0b1c2d]/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200">
                <div className="bg-white rounded-2xl shadow-xl w-full max-w-md flex flex-col max-h-[80vh]">
                  <div className="p-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                    <h2 className="text-lg font-black text-[#0b1c2d] flex items-center gap-2">
                      {activeModal === 'risk' ? <Flame className="text-[#e30613] w-5 h-5"/> : <TrendingUp className="text-[#fbbc04] w-5 h-5"/>}
                      {activeModal === 'risk' ? '관리 필요군 명단' : '급성장(PHV) 명단'}
                    </h2>
                    <button onClick={() => setActiveModal(null)} className="p-1 text-slate-400 hover:bg-slate-100 rounded-md transition-colors"><X className="w-5 h-5"/></button>
                  </div>
                  <div className="p-2 overflow-y-auto custom-scrollbar flex-1">
                    {(activeModal === 'risk' ? riskPlayersList : growthPlayersList).length === 0 ? (
                      <div className="p-6 text-center text-slate-400 font-bold text-sm">해당하는 선수가 없습니다.</div>
                    ) : (
                      <div className="space-y-1">
                        {(activeModal === 'risk' ? riskPlayersList : growthPlayersList).map(p => (
                          <div key={p.playerId} onClick={() => { setActiveModal(null); setSelectedPlayerId(p.playerId); }} className="flex justify-between items-center p-3 hover:bg-slate-50 cursor-pointer border border-transparent hover:border-blue-200 rounded-lg transition-colors">
                            <div className="flex items-center gap-3">
                              <span className="font-bold text-blue-600 hover:underline">{p.name}</span>
                              <span className="text-[10px] text-slate-400 bg-white border border-slate-200 px-1.5 py-0.5 rounded">{p.position}</span>
                            </div>
                            {activeModal === 'risk' ? (
                               <div className="flex gap-1.5">
                                 {p.physical.riskLevel.phyLoadRisk === '위험' && <span className="text-[10px] bg-[#e30613]/10 text-[#e30613] font-bold px-2 py-1 rounded">신체부하</span>}
                                 {p.physical.riskLevel.fatigueRisk === '위험' && <span className="text-[10px] bg-[#fbbc04]/20 text-[#d97706] font-bold px-2 py-1 rounded">피로누적</span>}
                               </div>
                            ) : (
                               <span className="text-[11px] text-[#d97706] font-bold bg-[#fbbc04]/10 px-2 py-1 rounded">
                                  뼈나이 {Math.floor(p.growth.boneAgeDecimal)}년 {Math.round((p.growth.boneAgeDecimal%1)*12)}월
                               </span>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* --- 선수 상세 전체 화면 모달 --- */}
          {selectedPlayerId && (() => {
            const player = players.find(p => p.playerId === selectedPlayerId);
            return player ? <PlayerDetail player={player} onBack={() => setSelectedPlayerId(null)} /> : null;
          })()}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
